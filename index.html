<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/img/favicon.svg" type="image/png">
    <title>Memory Game</title>
</head>
<body>
    <div>
        <!-- START -->
        <section id="screen-start">
            <article class="start-content">
                <div class="headline-group">
                    <span>It's play time.</span>
                    <h1>Ready to play?</h1>
                </div>
                <div class="button-wrapper">
                    <button id="button-play">
                        <img class="icon-controller" src="/img/controller-small.svg" alt="Controller Icon">
                        <p>Play</p>
                        <img class="icon-arrow-thin" src="/img/arrow-thin.svg" alt="">
                        <img class="icon-arrow-bold" src="/img/arrow-bold.svg" alt="">
                    </button>
                </div>
            </article>
            <img class="controller-bg" src="/img/controller-large.svg" alt="">
        </section>

        <!-- SETTINGS -->
        <section id="screen-settings" class="d-none">
            <article class="settings-content">
                <div class="settings-headline">
                    <h1>Settings</h1>
                    <img src="/img/arrow-yellow.svg" alt="">
                </div>
                <div class="settings-left">
                    <div class="settings-group">
                        <div class="group-title">
                            <img src="/img/icon-palette.svg" alt="">
                            <h2>Game Themes</h2>
                        </div>
                        <div class="radio-group">
                            <label><input type="radio" name="theme" value="code" checked>Code Design Theme</label>
                            <label><input type="radio" name="theme" value="gaming">Gaming Theme</label>
                        </div>
                    </div>
                    <div class="settings-group">
                        <div class="group-title">
                            <img src="/img/icon-player.svg" alt="">
                            <h2>Choose Player</h2>
                        </div>
                        <div class="radio-group">
                            <label><input type="radio" name="player" value="blue" checked>Blue</label>
                            <label><input type="radio" name="player" value="orange">Orange</label>
                        </div>
                    </div>
                    <div class="settings-group">
                        <div class="group-title">
                            <img src="/img/icon-board.svg" alt="">
                            <h2>Board Size</h2>
                        </div>
                        <div class="radio-group">
                            <label><input type="radio" name="size" value="16" checked>16 Cards</label>
                            <label><input type="radio" name="size" value="24">24 Cards</label>
                            <label><input type="radio" name="size" value="36">36 Cards</label>
                        </div>
                    </div>
                </div>
                <div class="settings-right">
                    <div class="preview-box">
                        <img id="preview-gaming" src="/img/code-design-theme-visual.svg" alt="Preview Code Design Theme">
                        <img id="preview-code" src="/img/gaming-theme-visual.svg" alt="Preview Gaming Theme" class="d-none">
                    </div>
                    <div class="settings-summary">
                        <span id="summary-theme" class="nowrap">Theme 1</span>
                        <img src="/img/slash-yellow.svg" alt="">
                        <span id="summary-player">Blue</span>
                        <img src="/img/slash-yellow.svg" alt="">
                        <span id="summary-board">16</span>
                        <div class="button-wrapper">
                            <button id="button-start">
                                <img src="/img/play-icon.svg" class="play-icon" alt="">
                                <p>Start</p>
                            </button>
                        </div>
                    </div>
                </div>
            </article>
        </section>

        <!-- GAME -->
        <section id="screen-game" class="d-none">
            <article class="game-content">
                <header class="game-header">
                    <div class="score-board">
                        <div class="score-player blue">
                            <img class="player-arrow theme-code-only" src="/img/player-blue-arrow.svg" alt="">
                            <span class="player-name theme-code-only">Blue</span>
                            <img class="player-arrow theme-gaming-only" src="/img/player-blue.svg" alt="">
                            <span class="player-score">0</span>
                        </div>
                        <div class="score-player orange">
                            <img class="player-arrow theme-code-only" src="/img/player-orange-arrow.svg" alt="">
                            <span class="player-name theme-code-only">Orange</span>
                            <img class="player-arrow theme-gaming-only" src="/img/player-orange.svg" alt="">
                            <span class="player-score">0</span>
                        </div>
                    </div>
                    <div class="current-player">
                        <span>Current Player:</span>
                        <img class="player-arrow" src="/img/player-blue-arrow.svg" alt="Blue Arrow">
                    </div>
                    <button class="button-exit">
                        <img src="/img/exit-icon.svg" alt="">
                        <p>Exit Game</p>
                    </button>
                </header>
                <div class="game-board">
                </div>
            </article>
        </section>

        <!-- GAME OVER -->
        <section id="screen-gameover" class="d-none">
            <article class="gameover-content">
                <h1>Game Over</h1>
                <div class="score-group">
                    <span class="score-label">Final Score</span>
                    <div class="score-board">
                        <div class="score-player blue">
                            <img class="player-arrow" src="/img/player-blue-arrow.svg" alt="Blue Arrow">
                            <span class="player-name">Blue</span>
                            <span class="player-score">10</span>
                        </div>
                        <div class="score-player orange">
                            <img class="player-arrow" src="/img/player-orange-arrow.svg" alt="Orange Arrow">
                            <span class="player-name">Orange</span>
                            <span class="player-score">16</span>
                        </div>
                    </div>
                </div>
            </article>
        </section>

        <!-- WINNER -->
        <section id="screen-winner" class="d-none">
            <img class="confetti" src="/img/confetti-white.svg" alt="">
            <article class="winner-content">
                <div class="headline-group">
                    <span>The winner is</span>
                    <h1>BLUE PLAYER</h1>
                </div>
                <img class="trophy" src="/img/player-blue.svg" alt="">
                <div class="button-wrapper">
                    <button>
                        <p>Back to Start</p>
                    </button>
                </div>
            </article>
        </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
