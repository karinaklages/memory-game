<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
</head>
<body>
    <div>
        <!-- START -->
        <section id="screen-start">
            <article class="start-content">
                <span>It's play time.</span>
                <h1>Ready to play?</h1>
                <button>
                    <img src="/img/controller-small.svg" alt="Controller Icon">
                    <strong>Play</strong>
                    <img src="/img/arrow-thin.svg" alt="">
                </button>
            </article>
            <img src="/img/controller-large.svg" alt="">
        </section>

        <!-- SETTINGS -->
        <section id="screen-settings"></section>

        <!-- GAME -->
        <section id="screen-game"></section>

        <!-- GAME OVER -->
        <section id="screen-game-over"></section>

        <!-- WINNER -->
        <section id="screen-winner"></section>
    </div>
    <script src="./src/main.ts" type="module"></script>
</body>
</html>
