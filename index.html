<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/favicon.svg" type="image/png">
    <link rel="stylesheet" href="./src/styles/style.scss">
    <title>Memory Game</title>
</head>
<body>
    <div>
        <!-- START -->
        <section id="screen-start">
            <article class="start-content">
                <div class="headline-group">
                    <span>It's play time.</span>
                    <h1>Ready to play?</h1>
                </div>
                <div class="button-wrapper">
                    <button id="button-play">
                        <img class="icon-controller" src="./img/controller-small.svg" alt="Controller Icon">
                        <p>Play</p>
                        <img class="icon-arrow-thin" src="./img/arrow-thin.svg" alt="">
                        <img class="icon-arrow-bold" src="./img/arrow-bold.svg" alt="">
                    </button>
                </div>
            </article>
            <img class="controller-bg" src="./img/controller-large.svg" alt="">
        </section>

        <!-- SETTINGS -->
        <section id="screen-settings" class="d-none">
            <article class="settings-content">
                <div class="settings-headline">
                    <h1>Settings</h1>
                    <img src="./img/arrow-yellow.svg" alt="">
                </div>
                <div class="settings-left">
                    <div class="settings-group">
                        <div class="group-title">
                            <img src="./img/icon-palette.svg" alt="">
                            <h2>Game Themes</h2>
                        </div>
                        <div class="radio-group">
                            <label data-text="Code Design Theme"><input type="radio" name="theme" value="code">Code Design Theme</label>
                            <label data-text="Gaming Theme"><input type="radio" name="theme" value="gaming">Gaming Theme</label>
                        </div>
                    </div>
                    <div class="settings-group">
                        <div class="group-title">
                            <img src="./img/icon-player.svg" alt="">
                            <h2>Choose Player</h2>
                        </div>
                        <div class="radio-group">
                            <label data-text="Blue"><input type="radio" name="player" value="blue">Blue</label>
                            <label data-text="Orange"><input type="radio" name="player" value="orange">Orange</label>
                        </div>
                    </div>
                    <div class="settings-group">
                        <div class="group-title">
                            <img src="./img/icon-board.svg" alt="">
                            <h2>Board Size</h2>
                        </div>
                        <div class="radio-group">
                            <label data-text="16 Cards"><input type="radio" name="size" value="16">16 Cards</label>
                            <label data-text="24 Cards"><input type="radio" name="size" value="24">24 Cards</label>
                            <label data-text="36 Cards"><input type="radio" name="size" value="36">36 Cards</label>
                        </div>
                    </div>
                </div>
                <div class="settings-right">
                    <div class="preview-box">
                        <img id="preview-code" src="./img/code-design-theme-visual.svg" alt="Preview Code Design Theme">
                        <img id="preview-gaming" src="./img/gaming-theme-visual.svg" alt="Preview Gaming Theme" class="d-none">
                    </div>
                    <div class="settings-summary">
                        <span id="summary-theme" class="nowrap">Theme</span>
                        <img src="./img/slash-yellow.svg" alt="">
                        <span id="summary-player">Player</span>
                        <img src="./img/slash-yellow.svg" alt="">
                        <span id="summary-board">Cards</span>
                        <div class="button-wrapper">
                            <button id="button-start" disabled>
                                <img src="./img/play-icon.svg" class="play-icon" alt="">
                                <p>Start</p>
                            </button>
                        </div>
                    </div>
                </div>
            </article>
        </section>

        <!-- GAME -->
        <section id="screen-game" class="d-none">
            <article class="game-content">
                <header class="game-header">
                    <div class="score-board">
                        <div class="score-player blue">
                            <img class="player-arrow theme-code-only" src="./img/player-blue-arrow.svg" alt="">
                            <span class="player-name theme-code-only">Blue</span>
                            <img class="player-arrow theme-gaming-only" src="./img/player-blue.svg" alt="">
                            <span class="player-score">0</span>
                        </div>
                        <div class="score-player orange">
                            <img class="player-arrow theme-code-only" src="./img/player-orange-arrow.svg" alt="">
                            <span class="player-name theme-code-only">Orange</span>
                            <img class="player-arrow theme-gaming-only" src="./img/player-orange.svg" alt="">
                            <span class="player-score">0</span>
                        </div>
                    </div>
                    <div class="current-player">
                        <span>Current Player:</span>
                        <img class="player-arrow" src="./img/player-blue-arrow.svg" alt="Blue Arrow">
                    </div>
                    <button class="button-exit">
                        <img src="./img/exit-icon.svg" alt="">
                        <p>Exit Game</p>
                    </button>
                </header>
                <div class="game-board">
                </div>
            </article>
        </section>

        <!-- GAME OVER -->
        <section id="screen-gameover" class="d-none">
            <article class="gameover-content">
                <h1>GAME OVER</h1>
                <div class="score-group">
                    <span class="score-label">Final Score</span>
                    <div class="score-board">
                        <div class="score-player blue">
                            <img class="player-arrow" src="./img/player-blue-arrow.svg" alt="Blue Arrow">
                            <span class="player-name">Blue</span>
                            <span class="player-score" id="gameover-score-blue"></span>
                        </div>
                        <div class="score-player orange">
                            <img class="player-arrow" src="./img/player-orange-arrow.svg" alt="Orange Arrow">
                            <span class="player-name">Orange</span>
                            <span class="player-score" id="gameover-score-orange"></span>
                        </div>
                    </div>
                </div>
            </article>
        </section>

        <!-- WINNER -->
        <section id="screen-winner" class="d-none">
            <img class="confetti" src="./img/confetti-white.svg" alt="">
            <article class="winner-content">
                <div class="headline-group">
                    <span>The winner is</span>
                    <h1>BLUE PLAYER</h1>
                </div>
                <img class="trophy" src="./img/player-blue.svg" alt="">
                <div class="button-wrapper">
                    <button>
                        <p>Back to Start</p>
                    </button>
                </div>
            </article>
        </section>

        <!-- DRAW -->
        <section id="screen-draw" class="d-none">
            <article class="draw-content">
                <div class="headline-group">
                    <span>It's a</span>
                    <h1>DRAW</h1>
                </div>
                <img class="draw theme-code-only" src="./img/scale-icon-turquoise.svg" alt="">
                <img class="draw theme-gaming-only" src="./img/scale-icon-pink.svg" alt="">
                <div class="button-wrapper">
                    <button>
                        <p>Back to Start</p>
                    </button>
                </div>
            </article>
        </section>

        <!-- DIALOG -->
        <dialog id="dialog-exit">
            <article class="dialog-content">
                <h2>Are you sure you want to<br>quit the game?</h2>
                <div class="dialog-buttons">
                    <button id="button-back-to-game">
                        <p>Back to Game</p>
                    </button>
                    <button id="button-exit-game">
                        <p>Exit Game</p>
                    </button>
                </div>
            </article>
        </dialog>
    </div>
    <script src="./src/settings.ts"></script>
    <script src="./src/game.ts"></script>
    <script src="./src/main.ts"></script>
</body>
</html>
